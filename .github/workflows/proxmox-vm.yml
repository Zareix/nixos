name: Proxmox VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TAILSCALE_VERSION: 1.84.0

jobs:
  build-vm:
    name: Build Proxmox VM image and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Unlock git-crypt
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt
          echo ${{ secrets.GIT_CRYPT_KEY }} | base64 -d | git-crypt unlock -

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build proxmox VM image
        run: |
          nix build '.#nixosConfigurations.default.config.system.build.images.proxmox'

      - name: Rename VMA
        run: |
          VMA=$(find -L ./result -name "vzdump-qemu-*.vma.zst" -type f)
          cp -L "$VMA" /tmp/nixos-vm-proxmox-default.vma.zst

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:github-actions
          version: ${{ env.TAILSCALE_VERSION }}

      - name: Upload to PVE
        working-directory: /tmp
        env:
          PVE_API_URL: ${{ secrets.PVE_API_URL }}
          PVE_API_TOKEN: ${{ secrets.PVE_API_TOKEN }}
        run: |
          curl -k \
            -X POST "$PVE_API_URL/api2/json/nodes/sol/storage/local/upload" \
            -H "Authorization: PVEAPIToken=$PVE_API_TOKEN" \
            -F "content=import" \
            -F "filename=@nixos-vm-proxmox-default.vma.zst"

      - name: Lock git-crypt
        run: |
          git-crypt lock

      - name: Delete local output
        run: |
          rm -rf ./result
          rm -f /tmp/nixos-vm-proxmox-default.vma.zst
